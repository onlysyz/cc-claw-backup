<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2cbf"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#00d4ff" stroke-width="0.5"/>
  </g>

  <!-- Logo -->
  <text x="600" y="180" font-family="Arial Black, sans-serif" font-size="120" font-weight="bold" fill="url(#accent)" text-anchor="middle">🦞</text>

  <!-- Title -->
  <text x="600" y="260" font-family="Arial Black, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">CC-CLAW</text>

  <!-- Tagline -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="28" fill="#a0a0a0" text-anchor="middle">Your tireless AI working companion</text>

  <!-- Divider -->
  <rect x="350" y="360" width="500" height="4" rx="2" fill="url(#accent)"/>

  <!-- Value prop -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle">Make every token count</text>

  <!-- Features row -->
  <g font-family="Arial, sans-serif" font-size="20" fill="#a0a0a0">
    <text x="200" y="500" text-anchor="middle">🎯 Goal-Driven</text>
    <text x="450" y="500" text-anchor="middle">⚡ Autonomous</text>
    <text x="600" y="500" text-anchor="middle">🔒 Private</text>
    <text x="750" y="500" text-anchor="middle">🏖️ Smart Rest</text>
    <text x="1000" y="500" text-anchor="middle">🤫 Silent</text>
  </g>

  <!-- CTA -->
  <rect x="450" y="540" width="300" height="50" rx="25" fill="url(#accent)"/>
  <text x="600" y="575" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">github.com/onlysyz/cc-claw</text>

  <!-- Corner accents -->
  <path d="M0 50 L50 50 L50 0" fill="none" stroke="#00d4ff" stroke-width="3"/>
  <path d="M1200 50 L1150 50 L1150 0" fill="none" stroke="#00d4ff" stroke-width="3"/>
  <path d="M0 580 L50 580 L50 630" fill="none" stroke="#00d4ff" stroke-width="3"/>
  <path d="M1200 580 L1150 580 L1150 630" fill="none" stroke="#00d4ff" stroke-width="3"/>
</svg>